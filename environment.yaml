name: conda-recipe-manager
channels:
  - defaults

# TODO Future: break-up dev dependencies into a separate environment file.
dependencies:
  - black
  - isort
  - make
  - mypy
  # As of 2026-02-23, Python 3.14 lacks a number of packages on the `defaults` channel, preventing our ability to
  # install all dependencies.
  - python >=3.11,<3.14
  - pytest
  - pytest-cov
  - pytest-socket >=0.7.0
  - pytest-xdist
  - pyfakefs >=6.0.0
  # Match version with .pre-commit-config.yaml to ensure consistent rules with `make lint`.
  - pylint ==4.0.4
  - pip
  - click 8.2.1
  - conda
  - evalidate >=2.0.3,<3.0.0
  - jinja2
  - pyyaml
  - types-pyyaml
  - jsonschema
  - types-jsonschema
  - requests
  - types-requests
  - gitpython
  - pre-commit
  # Documentation generation packages
  # NOTE: `sphinx` 9.1.0 is not available for Python 3.11, which is the minimum supported by CRM.
  - sphinx ==8.2.3
  # NOTE: 3.14 does not support Python 3.14 yet.
  - sphinx-book-theme >=1.1.4
