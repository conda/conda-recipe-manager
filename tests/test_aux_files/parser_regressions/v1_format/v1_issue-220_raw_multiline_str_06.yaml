        - array-api-strict >=2.3.1
        - asv
        - gmpy2
        - hypothesis >=6.30
        - mpmath
        - pooch
        - pytest >=8.0.0
        - pytest-timeout
        - pytest-xdist
        - pyyaml
        - threadpoolctl
    script:
      - python -c "import sys, scipy, numpy; print(scipy.__version__, numpy.__version__, sys.version_info)"
      - python -c "import numpy; numpy.show_config()"
      - python -c "import scipy, sys; sys.exit(not scipy.test(verbose=1, label='full', tests=None, extra_argv=['-k', 'not (_not_a_real_test)', '-n', '3', '--timeout=1800', '--durations=50']))"
